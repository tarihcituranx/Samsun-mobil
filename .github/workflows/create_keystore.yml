name: Keystore Olustur

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key alias'
        default: 'samsun_ulasim'
        required: false
        type: string
      password: Samsun2026
        description: 'Keystore sifresi'
        required: true
        type: string

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Keystore olustur
        run: |
          keytool -genkey -v -keystore samsun_ulasim.jks -keyalg RSA -keysize 2048 -validity 10000 -alias "${{ github.event.inputs.alias }}" -storepass "${{ github.event.inputs.password }}" -keypass "${{ github.event.inputs.password }}" -dname "CN=Samsun Ulasim, OU=Mobil, O=Samsun, L=Samsun, S=Samsun, C=TR"

      - name: Base64 ciktisi
        run: |
          echo "KEYSTORE_BASE64 degerini kopyala:"
          base64 -w 0 samsun_ulasim.jks
          echo ""
