name: Keystore Olustur

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Keystore olustur
        run: |
          keytool -genkey -v -keystore samsun_ulasim.jks -keyalg RSA -keysize 2048 -validity 10000 -alias samsun_ulasim -storepass Samsun2026 -keypass Samsun2026 -dname "CN=Samsun Ulasim, OU=Mobil, O=Samsun, L=Samsun, S=Samsun, C=TR"

      - name: Base64 ciktisi
        run: |
          echo "KEYSTORE_BASE64 degerini kopyala:"
          base64 -w 0 samsun_ulasim.jks
          echo ""
