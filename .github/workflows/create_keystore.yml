name: Keystore Oluştur (Tek Seferlik)

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key alias'
        default: 'samsun_ulasim'
      password: Samsun2026
        description: 'Keystore & key şifresi'
        required: true

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Keystore oluştur
        run: |
          keytool -genkey -v \
            -keystore samsun_ulasim.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias "${{ github.event.inputs.alias }}" \
            -storepass "${{ github.event.inputs.password }}" \
            -keypass  "${{ github.event.inputs.password }}" \
            -dname "CN=Samsun Ulasim, OU=Mobil, O=Samsun, L=Samsun, S=Samsun, C=TR"

      - name: Base64 çıktısını göster
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "KEYSTORE_BASE64 → bu değeri Secret'a ekle:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          base64 -w 0 samsun_ulasim.jks
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
