name: Keystore Yenile
on:
  workflow_dispatch:
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Keystore olustur
        run: |
          keytool -genkey -v \
            -keystore samsun_ulasim.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias samsun_ulasim \
            -storepass Samsun2026 \
            -keypass Samsun2026 \
            -dname "CN=Samsun Ulasim, OU=Mobil, O=Samsun, L=Samsun, S=Samsun, C=TR"

      - name: Boyut kontrol
        run: |
          size=$(wc -c < samsun_ulasim.jks)
          echo "Keystore boyutu: ${size} bayt"
          [ "$size" -gt 2048 ] && echo "OK" || { echo "HATA: Çok küçük!"; exit 1; }

      - name: Base64 ciktisi (TEK SATIR)
        run: |
          echo "=== KEYSTORE_BASE64 secret değerini aşağıdan kopyala ==="
          base64 -w 0 samsun_ulasim.jks
          echo ""
          echo "=== BITTI ==="
