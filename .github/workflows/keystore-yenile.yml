name: Keystore Olustur ve Secret Kaydet
on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Keystore olustur
        run: |
          keytool -genkey -v \
            -keystore samsun_ulasim.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias samsun_ulasim \
            -storepass Samsun2026 \
            -keypass Samsun2026 \
            -dname "CN=Samsun Ulasim, OU=Mobil, O=Samsun, L=Samsun, S=Samsun, C=TR"

      - name: Boyut dogrula
        run: |
          size=$(wc -c < samsun_ulasim.jks)
          echo "Keystore boyutu: ${size} bayt"
          [ "$size" -gt 2048 ] || { echo "HATA: JKS çok küçük!"; exit 1; }

      # gh CLI ile KEYSTORE_BASE64 secret'ını direkt repo'ya yazar
      # Kopyala-yapıştır yok → kesilen/maskelenen base64 sorunu yok
      - name: KEYSTORE_BASE64 secret otomatik kaydet
        env:
          GH_TOKEN: ${{ secrets.APK_REPO_TOKEN }}
        run: |
          base64 -w 0 samsun_ulasim.jks | gh secret set KEYSTORE_BASE64 \
            --repo tarihcituranx/Samsun-mobil
          echo "✅ KEYSTORE_BASE64 secret başarıyla güncellendi"

      - name: JKS dosyasını artifact olarak sakla (yedek)
        uses: actions/upload-artifact@v4
        with:
          name: keystore-backup
          path: samsun_ulasim.jks
          retention-days: 1
