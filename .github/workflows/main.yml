name: Samsun Mobil — Analiz ve APK Derle
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Her commit'te çalışır: Flutter analiz ────────────────
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu klonla
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-stable-${{ runner.os }}

      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Flutter analiz
        run: flutter analyze || true

  # ── APK build: sadece elle tetikleme veya commit mesajında [release] etiketi ──
  #
  #   Nasıl tetiklenir?
  #   1) GitHub → Actions → "Run workflow" butonu  (her zaman)
  #   2) git commit -m "[release] Harita güncellemesi"  (commit mesajına [release] ekle)
  #
  #   Normal commit'ler (bug fix, refactor, dosya düzeni vb.) build BAŞLATMAZ.
  build:
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    steps:
      # 1) Kodu al
      - name: Repoyu klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.APK_REPO_TOKEN }}

      # 2) Flutter kur
      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-stable-${{ runner.os }}

      # 2b) Android lisanslarını kabul et
      - name: Android lisanslarını kabul et
        run: yes | flutter doctor --android-licenses || true

      # 3) Pub cache
      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # 4) Gradle cache
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # 5) Keystore oluştur ve BOYUT kontrolü yap
      # ─────────────────────────────────────────────────────────────────────────
      # BUG #69 KÖK NEDENİ:
      #   base64 --decode bazen sessizce kısmi/bozuk bir .jks dosyası oluşturur
      #   (özellikle secret'ta satır sonu veya padding sorunu varsa).
      #   Ardından keytool -list | head -10 doğrulaması YANLIŞ POZİTİF verir
      #   çünkü 'head' her zaman exit 0 döner → keytool'un hata kodu kaybolur.
      #   Gradle packageRelease adımında private key okunmaya çalışılınca
      #   java.io.EOFException fırlatılır ve build 9 dakika sonra çöker.
      #
      # DÜZELTME:
      #   a) base64 decode sonrası dosya boyutu > 2 KB zorunluluğu
      #   b) keytool -exportcert (private key'i gerçekten okur, sadece header'ı değil)
      #   c) set -euo pipefail + PIPESTATUS ile pipe hata maskesini engelle
      # ─────────────────────────────────────────────────────────────────────────
      - name: Keystore yaz
        run: |
          set -euo pipefail
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/samsun_ulasim.jks

          # Boyut kontrolü: gerçek bir JKS dosyası en az 2 KB olmalı
          size=$(wc -c < android/app/samsun_ulasim.jks)
          echo "Keystore boyutu: ${size} bayt"
          if [ "$size" -lt 2048 ]; then
            echo "HATA: Keystore dosyası çok küçük (${size} bayt < 2048 bayt)!"
            echo "KEYSTORE_BASE64 secret'ı bozuk veya eksik olabilir."
            echo "Yeniden oluşturmak için: base64 -w 0 samsun_ulasim.jks | pbcopy"
            exit 1
          fi
          echo "Keystore boyutu OK (${size} bayt)"

      # 6) key.properties oluştur
      # HATA KAYNAĞI (ESKİ): heredoc (cat << EOF) YAML içinde girintili yazılırsa
      #   her satırın başına boşluk ekler → Gradle "  storePassword=..." tanımaz
      #   → key null → signing çöker → 11 dakika boşa gider
      # ÇÖZÜM: echo ile satır satır yaz, baştaki boşluk oluşmaz.
      - name: key.properties yaz
        run: |
          {
            echo "storePassword=${{ secrets.STORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=samsun_ulasim.jks"
          } > android/key.properties

      # 6b) Keystore ve signing doğrula
      # ─────────────────────────────────────────────────────────────────────────
      # DÜZELTME: keytool -exportcert kullan (private key'i tam okur).
      #   Eski: keytool -list | head -10 → head her zaman 0 döner, keytool
      #         hatası maskelenir → yanlış pozitif doğrulama.
      #   Yeni: set -euo pipefail + keytool -exportcert → private key gerçekten
      #         okunur; hata varsa build hemen durur, 9 dakika boşa gitmez.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Signing config doğrula
        run: |
          set -euo pipefail

          echo "=== Keystore dosya kontrolü ==="
          ls -lh android/app/samsun_ulasim.jks || { echo "HATA: keystore yok!"; exit 1; }

          echo "=== Private key okuma testi (exportcert) ==="
          # -exportcert, private key'i tam olarak okur.
          # Eski -list | head -10 yaklaşımı truncated JKS'de false-positive veriyordu.
          keytool -exportcert \
            -keystore android/app/samsun_ulasim.jks \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -alias    "${{ secrets.KEY_ALIAS }}" \
            -file /dev/null \
            2>&1
          echo "=== Private key OK ==="

          echo "=== key.properties (baştaki boşluk kontrolü: $ işareti satır sonu demek) ==="
          cat -A android/key.properties

          echo "=== Signing doğrulama BAŞARILI ==="

      # 6c) Gradle bellek ayarları (varsayılan ~512m-1g → release build için 4g gerekli)
      - name: Gradle bellek ayarla
        run: |
          GRADLE_PROPS="android/gradle.properties"
          if grep -q "org.gradle.jvmargs" "$GRADLE_PROPS" 2>/dev/null; then
            sed -i 's/org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m/' "$GRADLE_PROPS"
          else
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m" >> "$GRADLE_PROPS"
          fi
          grep -q "org.gradle.daemon"   "$GRADLE_PROPS" || echo "org.gradle.daemon=false"  >> "$GRADLE_PROPS"
          grep -q "org.gradle.parallel" "$GRADLE_PROPS" || echo "org.gradle.parallel=true" >> "$GRADLE_PROPS"
          echo "=== gradle.properties son hali ==="
          cat "$GRADLE_PROPS"

      # 7) build.sh'ı çalıştır (her şeyi o halleder)
      - name: Build & Deploy
        env:
          APK_REPO_TOKEN: ${{ secrets.APK_REPO_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GIT_USER_NAME: "GitHub Actions"
          GIT_USER_EMAIL: "actions@github.com"
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh

      # 8) Build logları artifact
      - name: Artifacts kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore

      # 9) Bug raporu artifact
      - name: Bug raporunu sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-report-${{ github.run_number }}
          path: |
            /home/runner/bug_report_*.md
            logs/bug_report_*.md
          retention-days: 30
          if-no-files-found: ignore

      # 10) Log klasörü artifact
      - name: Log klasörünü sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-logs-${{ github.run_number }}
          path: |
            logs/
            scripts/*.log
          retention-days: 30
          if-no-files-found: ignore
