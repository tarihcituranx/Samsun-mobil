name: Samsun Mobil — Analiz ve APK Derle
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Her commit'te çalışır: Flutter analiz ────────────────
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu klonla
        uses: actions/checkout@v4

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-stable-${{ runner.os }}

      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Flutter analiz
        run: flutter analyze || true

  # ── APK build: sadece 'build:' prefix veya manual dispatch ──
  build:
    needs: analyze
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'build:')
    runs-on: ubuntu-latest
    steps:
      # 1) Kodu al
      - name: Repoyu klonla
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.APK_REPO_TOKEN }}

      # 2) Flutter kur
      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: flutter-stable-${{ runner.os }}

      # 2b) Android lisanslarını kabul et
      - name: Android lisanslarını kabul et
        run: yes | flutter doctor --android-licenses || true

      # 3) Pub cache
      - name: Pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # 4) Gradle cache
      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      # 5) Keystore oluştur
      - name: Keystore yaz
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/samsun_ulasim.jks

      # 6) key.properties oluştur
      - name: key.properties yaz
        run: |
          cat > android/key.properties << EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=samsun_ulasim.jks
          EOF

      # 7) build.sh'ı çalıştır (her şeyi o halleder)
      - name: Build & Deploy
        env:
          APK_REPO_TOKEN: ${{ secrets.APK_REPO_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GIT_USER_NAME: "GitHub Actions"
          GIT_USER_EMAIL: "actions@github.com"
        run: |
          chmod +x scripts/build.sh
          bash scripts/build.sh

      # 8) Artifacts olarak da sakla (opsiyonel yedek)
      - name: Artifacts kaydet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14

      # 9) Bug raporu artifact
      - name: Bug raporunu sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-report-${{ github.run_number }}
          path: /home/runner/bug_report_*.md
          retention-days: 30

      # 10) Log klasörü artifact
      - name: Log klasörünü sakla
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-logs-${{ github.run_number }}
          path: |
            logs/
            scripts/*.log
          retention-days: 30
