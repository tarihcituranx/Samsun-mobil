openapi: "3.1.0"
info:
  title: Samsun ASIS API — Gerçek Yanıt Yapısına Göre Güncel Şema
  summary: Samsun toplu taşıma canlı araç takibi, durak sorgulama ve sefer saatleri
  description: >
    **Düzenleyen:** Turan KAYA
    **Orijinal Swagger:** https://api.samsun.bel.tr/OHSSoapToJson/swagger/index.html
    **Son test tarihi:** 2026-03-05

    ---

    ## Bu Şema Hakkında

    Bu şema, resmi Swagger dokümantasyonunun **gerçek API davranışını yanlış yansıttığı**
    noktaları canlı testlerle doğrulayarak düzeltilmiştir. Her endpoint için:

    - Gerçek yanıt yapısı (wrapper format, alan adları, veri tipleri)
    - Gizli kısıtlamalar ve zorunlu parametre kombinasyonları
    - Belgelenmemiş davranışlar ve yan etkiler
    - Flutter/Dart uygulamalarında dikkat edilmesi gerekenler

    ayrıntılı biçimde açıklanmıştır.

    ---

    ## Tüm Endpoint'lerde Geçerli Kurallar

    ### Yanıt Zarfı (ApiResponse Wrapper)
    **Tüm endpoint'ler**, veri döndürsün ya da dönmesin, her zaman aşağıdaki
    zarflı yapıyı kullanır:
    ```json
    { "statusCode": <integer>, "message": "<string>", "data": <list|null> }
    ```
    Ham liste (`[{...}]`) formatı DÖNDÜRÜLMEZ. Önceki şemada "düz liste dönebilir"
    şeklinde belirtilen davranış testlerde doğrulanamadı.

    ### İç statusCode Değeri
    HTTP durum kodu her zaman `200` gelse de, zarftaki `statusCode` alanı
    hata durumlarında `500` olabilir (ör. Schedules'ta sadece lineCode gönderilince).
    HTTP durum kodu ile iç statusCode **bağımsız** hareket eder.

    ### Zorunlu Parametre Gerektiren Endpoint'ler
    `LineDirections` ve `RealTimeData` endpoint'leri parametresiz çağrıldığında
    HTTP `400` döndürür (ASP.NET model validation hatası).
    Boş string (`lineCode=`) göndermek de `400` alır.

    ---

    ## Kritik Davranış Notları (Bilinen Kısıtlamalar)

    ### 1. LineDirections — Filtre Çalışmıyor
    `lineCode` parametresi gönderilmesi **zorunludur** (yoksa 400),
    ancak değeri ne olursa olsun (gerçek hat kodu, sahte kod, farklı hatlar)
    **daima sistemdeki tüm 8557 kayıt** döner. Sunucu taraflı filtreleme yoktur.
    Belirli bir hat için veri istiyorsanız istemci tarafında `lineCode` alanına
    göre filtreleme yapmanız **zorunludur**.

    ### 2. Schedules — scheduleDate Filtresi Etkisiz
    Her iki parametre de gönderilmesi **zorunludur** (biri eksikse statusCode=500, data=[]).
    Ancak `scheduleDate` değeri (dün, bugün, yarın) sonucu **hiç etkilemez**.
    API daima aktif çizelge programını döndürür. Tarih bazlı farklılaşma yoktur.

    ### 3. StopsStations — Sıfır/Negatif stopId Tümünü Getirir
    `stopId=0` veya `stopId=-1` gönderildiğinde tüm 4522 durak döner.
    Bu, "geçersiz giriş = tüm veri" anti-pattern'ıdır.
    Uygulama katmanında `stopId > 0` doğrulaması yapılmalıdır.

    ### 4. RealTimeData — yon Alanı Pusula Derecesidir
    `yon` alanı `"gidis"` / `"donus"` değil, **0–360 aralığında pusula derecesi** taşır.
    Örnek değerler: `"47"`, `"248"`, `"0"`, `"72"`.

    ### 5. Schedules — yon Alanı Tek Harf
    `"gidis"` / `"donus"` değil, **`"G"` (gidiş) veya `"D"` (dönüş)** gelir.

  version: "2.0.0"
  contact:
    name: Turan KAYA
    url: https://github.com/tarihcituranx
  license:
    name: Resmi Belediye API — Gayriresmi şema (canlı test tabanlı düzeltme)
    url: https://github.com/tarihcituranx/TuranAPI

servers:
  - url: https://api.samsun.bel.tr/OHSSoapToJson
    description: >
      ASIS API Sunucusu (SOAP → JSON adaptörü).
      Doğrudan erişim mümkündür; proxy gerekmez.

security: []

# ═══════════════════════════════════════════════════════════════════
components:
  schemas:

    # ── Tüm endpoint'lerin ortak yanıt zarfı ──────────────────────
    ApiResponse:
      type: object
      description: >
        **Tüm endpoint'lerin kullandığı standart yanıt zarfı.**
        Ham liste dönmez; her yanıt bu yapıyla gelir.

        `statusCode` alanı HTTP durum kodundan **bağımsızdır**.
        HTTP 200 gelse bile `statusCode` 500 olabilir (ör. eksik parametre).
        500 geldiğinde `data` genellikle boş listedir.
      required: [statusCode, message, data]
      properties:
        statusCode:
          type: integer
          description: >
            İç durum kodu. Başarıda `200`, SOAP backend hatasında `500`.
            HTTP durum kodu ile karıştırılmamalıdır.
          example: 200
        message:
          type: string
          description: Hata veya bilgi mesajı. Başarıda genellikle boş string.
          example: ""
        data:
          description: Dönen kayıt listesi. Hata veya sonuç yoksa boş liste `[]`.
          oneOf:
            - type: array
            - type: "null"

    # ── Hata yanıtı (HTTP 400) ─────────────────────────────────────
    ValidationErrorResponse:
      type: object
      description: >
        ASP.NET model doğrulama hatası. `LineDirections` ve `RealTimeData`
        endpoint'leri zorunlu parametresiz çağrıldığında döner.
        Boş string (`lineCode=`) da bu hatayı tetikler.
      properties:
        type:
          type: string
          example: "https://tools.ietf.org/html/rfc7231#section-6.5.1"
        title:
          type: string
          example: "One or more validation errors occurred."
        status:
          type: integer
          example: 400
        traceId:
          type: string
          example: "00-abc123-def456-00"
        errors:
          type: object
          description: Alan bazlı hata detayları

    # ── Hat Kaydı (Lines / OrjLines) ──────────────────────────────
    LineItem:
      type: object
      description: >
        Tek bir hat kaydı. `Lines` ve `OrjLines` endpoint'lerinden döner.

        **Dikkat — Lines vs OrjLines farkı:**
        - `Lines` (74 kayıt): Aktif, operasyonel hatlar. `tip` alanı içerir.
          `shortLineName` GTFS kısa kodu içerir (örn. `"339"`).
        - `OrjLines` (134 kayıt): Ham/tüm hatlar. `tip` alanı yoktur.
          `shortLineName` tam hat adını taşır (örn. `"15 BÜYÜK CAMİ - SOĞUKSU"`).
          `totalRow` ek alanı bulunur.
      required: [lineCode, lineNo, lineName, shortLineName]
      properties:
        lineCode:
          type: string
          description: >
            Hat kodu. `StopsStations`, `RealTimeData`, `Schedules` endpoint'lerinde
            bu değer `lineCode` parametresi olarak kullanılır.
            **Boşluk hassastır:** `"13  BL.EVLERİ-TOKİ"` (çift boşluk) gibi değerler
            URL encode edilerek tam eşleşme ile gönderilmelidir.
          example: "13 TOKİ-BL.EVLERİ"
        lineNo:
          type: string
          description: Hat numarası (integer gibi görünse de string olarak gelir).
          example: "35"
        lineName:
          type: string
          description: Hattın tam açıklama adı.
          example: "13 KAMALI TOKİ - SOĞUKSU"
        shortLineName:
          type: string
          description: >
            **Lines'ta:** GTFS `route_short_name` standardında kısa hat kodu (örn. `"339"`).
            **OrjLines'ta:** Tam hat adı (örn. `"15 BÜYÜK CAMİ - SOĞUKSU"`).
            İki endpoint arasında anlam farklıdır.
          example: "339"
        tip:
          type: string
          description: >
            **Yalnızca Lines endpoint'inde gelir; OrjLines'ta bu alan yoktur.**
            Hattın yönünü gösterir.
          enum: [gidis, donus]
          example: "donus"

    # ── Durak Kaydı ───────────────────────────────────────────────
    StopItem:
      type: object
      description: >
        Bir durağın statik bilgileri (konum, ad, sıra).
        Canlı araç bilgisi **içermez** — bunun için `SmartStationItem` kullanın.

        **orderId Notu:** `lineCode` ile sorgulandığında hat üzerindeki sıra numarasını
        gösterir (1'den başlar). `stopId` ile sorgulandığında durak birden fazla hatta
        geçebileceğinden birden fazla kayıt dönebilir (farklı `orderId` ile).

        **lineCode + stopId birlikte kullanımı:** Tek kayıt döner; o hattaki orderId
        ile birlikte gelir. Her iki filtreyi birden kullanarak spesifik konumu alabilirsiniz.
      required: [stopId, stopName, orderId, latitude, longitude]
      properties:
        stopId:
          type: string
          description: >
            Durak kimlik numarası. `SmartStations` endpoint'inin `stationId`
            parametresiyle aynı değerdir.
          example: "5392"
        stopName:
          type: string
          description: >
            Durak adı. Format genellikle `"<durak_kodu> - <açıklama>"` şeklindedir
            (örn. `"32561 - ŞEHİT YÜZBAŞI TUNÇ FİDANERİ İÖO"`).
          example: "32561 - ŞEHİT YÜZBAŞI TUNÇ FİDANERİ İÖO"
        orderId:
          type: string
          description: >
            Durak sıra numarası. `lineCode` ile sorgularda 1'den başlar.
            Parametresiz sorgularda 0 olabilir.
          example: "1"
        latitude:
          type: string
          description: Enlem (WGS84). Samsun için ~41.xx aralığında.
          example: "41.326801248568"
        longitude:
          type: string
          description: Boylam (WGS84). Samsun için ~36.xx aralığında.
          example: "36.236367954589"

    # ── Akıllı Durak (SmartStations) ──────────────────────────────
    SmartStationItem:
      type: object
      description: >
        Bir durağa yaklaşan **canlı** araç bilgisi.
        Bu veri fiziksel akıllı durak ekranlarıyla aynı kaynaktan gelir.

        **Yorumlama Rehberi:**
        - `RemainingTimeCurr`: En yakın aracın tahmini varış süresi (dakika).
          `"0"` = araç durağa ulaştı veya çok yakın.
        - `RemainingTimeNext`: İkinci aracın tahmini varış süresi.
          `"60"` veya `"61"` = planlanmış ama henüz yola çıkmamış.
        - `IsAccordingToTimeSchedule`: `"A"` = çizelgeye uygun.
        - `BusStatusCurr/Next`: `"0"` = normal. Diğer değerler: arıza/gecikme kodu.
        - `distance`: Ham mesafe değeri (çok büyük sayılar gelebilir, güvenilirliği sınırlı).
        - `latitude`/`longitude`: Aracın **anlık** konumu (WGS84, ~41.xx / ~36.xx).
        - `direction`: Aracın **pusula derecesi** (0–360, integer string).
        - `speed`: Aracın anlık hızı (km/s, integer string).
      required: [BusLineCode, BusLineNo, BusLineShortName, panelId]
      properties:
        BusLineCode:
          type: string
          description: >
            Hat kodu ve adı. Format: `"<hat_adı> (<sayı>)"`.
            Parantez içindeki sayı iç bir referans numarasıdır.
            Windows-1254 kaynaklı karakter bozuklukları olabilir; Türkçe düzeltmesi önerilir.
          example: "13 SOĞUKSU - KAMALI TOKİ (275)"
        BusLineNo:
          type: string
          description: Hat numarası.
          example: "36"
        BusLineShortName:
          type: string
          description: GTFS kısa hat kodu.
          example: "338"
        panelId:
          type: string
          description: Sorgulanan durak/panel kimliği. `StopsStations`'daki `stopId` ile aynıdır.
          example: "6119"
        RemainingTimeCurr:
          type: string
          description: En yakın aracın tahmini varış süresi (dakika). `"0"` = durağa geldi/çok yakın.
          example: "1"
        RemainingTimeNext:
          type: string
          description: İkinci en yakın aracın tahmini varış süresi (dakika). `"61"` tipik bekleme değeri.
          example: "61"
        IsAccordingToTimeSchedule:
          type: string
          description: Çizelgeye uygunluk. `"A"` = uygun.
          example: "A"
        BusStatusCurr:
          type: string
          description: Mevcut aracın operasyonel durumu. `"0"` = normal.
          example: "0"
        BusStatusNext:
          type: string
          description: Sonraki aracın operasyonel durumu. `"0"` = normal.
          example: "0"
        distance:
          type: string
          description: >
            Araç ile durak arasındaki ham mesafe değeri.
            Çok büyük sayılar gelebilir (örn. `"27136011373"`); hesaplama güvenilirliği sınırlıdır.
          example: "381753479"
        RemainingNumberOfBusStops:
          type: string
          description: >
            Araç bu durağa kaç durak kaldığı. `"0"` = araç şu an durağın önünde.
          example: "15"
        latitude:
          type: string
          description: Aracın anlık enlemi (WGS84). Samsun için ~41.xx.
          example: "41.37006833"
        longitude:
          type: string
          description: Aracın anlık boylamı (WGS84). Samsun için ~36.xx.
          example: "36.22803333"
        speed:
          type: string
          description: Aracın anlık hızı (km/s).
          example: "51"
        direction:
          type: string
          description: Aracın pusula yönü (0–360 derece, 0=Kuzey, 90=Doğu, 180=Güney, 270=Batı).
          example: "157"

    # ── Hat Yön Kaydı (LineDirections) ────────────────────────────
    LineDirectionItem:
      type: object
      description: >
        Bir hattın durak bazındaki yön/güzergah kaydı.

        **KRİTİK UYARI — Filtre Çalışmıyor:**
        `lineCode` parametresi ne gönderilirse gönderilsin (gerçek hat, sahte kod)
        daima **tüm sistemdeki 8557 kayıt** döner. Sunucu taraflı filtreleme yoktur.
        **İstemci tarafında `lineCode` alanına göre filtreleme zorunludur.**

        Bu endpoint'in amacı: Tüm hatların güzergah/durak sırası ile yön verisi.
      properties:
        Direction:
          type: string
          description: >
            Hat yön tipi. Tespit edilen üç değer:
            - `"FORWARD"`: Gidiş yönü
            - `"BACKWARD"`: Dönüş yönü
            - `"CIRCULAR"`: Dairesel/ring hat
          enum: [FORWARD, BACKWARD, CIRCULAR]
          example: "FORWARD"
        lineCode:
          type: string
          description: >
            Kaydın ait olduğu hat kodu. İstemci filtrelemesi için bu alan kullanılır.
          example: "13 TOKİ-BL.EVLERİ"
        lineNo:
          type: string
          description: Hat numarası.
          example: "35"
        stopName:
          type: string
          description: Durağın adı.
          example: "32561 - ŞEHİT YÜZBAŞI TUNÇ FİDANERİ İÖO"
        orderId:
          type: string
          description: Bu durağın hat üzerindeki sıra numarası.
          example: "1"
        durakId:
          type: string
          description: >
            Durağın kimlik numarası. `StopsStations.stopId` ve
            `SmartStations.stationId` ile aynı değerdir.
          example: "5392"

    # ── Canlı Araç Konumu (RealTimeData) ──────────────────────────
    RealTimeItem:
      type: object
      description: >
        Hatta aktif olarak sefer yapan bir aracın anlık verisi.

        **yon Alanı:** `"gidis"/"donus"` değil, **0–360 arası pusula derecesidir.**
        Hareket yönünü gösterir (0=Kuzey, 90=Doğu, 180=Güney, 270=Batı).
        Örnek değerler: `"47"`, `"248"`, `"0"`, `"72"`, `"270"`.

        **KVKK Uyarısı:** `surucu` alanı sürücünün **ad-soyad ve cep telefonu numarasını**
        açık metin içerir. Kullanıcı arayüzünde gösterilmesi önerilmez.
      properties:
        plaka:
          type: string
          description: Aracın plaka numarası.
          example: "55 APK 902"
        enlem:
          type: string
          description: Aracın anlık enlemi (WGS84, ~41.xx).
          example: "41.36777833"
        boylam:
          type: string
          description: Aracın anlık boylamı (WGS84, ~36.xx).
          example: "36.18768167"
        renk:
          type: string
          description: >
            Harita ikonunda kullanılan renk kodu (hex, # olmadan).
            Tespit edilen değerler: `"00FF00"` (yeşil=normal), `"FF0000"` (kırmızı=dikkat),
            `"FFFF00"` (sarı=uyarı).
          example: "00FF00"
        hiz:
          type: string
          description: Anlık hız (km/s, iki ondalık basamaklı string). `"0.00"` = araç duruyor.
          example: "67.00"
        mesafe:
          type: string
          description: Aracın günlük toplam kat ettiği mesafe (metre).
          example: "129120"
        surucu:
          type: string
          description: >
            **⚠ KVKK:** Sürücü adı ve telefon numarası. Format: `"AD SOYAD ((5XX)XXX XX XX)"`.
            Kullanıcıya gösterilmesi önerilmez.
          example: "EMRE KAYIRICI ((542)390 45 77)"
        gunlukYolcu:
          type: string
          description: Araçın günlük toplam taşıdığı yolcu sayısı.
          example: "492"
        seferYolcu:
          type: string
          description: Mevcut seferde taşınan yolcu sayısı.
          example: "151"
        durakYolcu:
          type: string
          description: Şu an durağa inen/binen yolcu sayısı.
          example: "0"
        toplamHasilat:
          type: string
          description: >
            Günlük toplam hasılat (TL). Float string olarak gelir.
            **Not:** Test scriptinde koordinat analiz fonksiyonu bu alanı yanlışlıkla
            koordinat olarak işaretledi — koordinat değil, TL hasılat değeridir.
          example: "3210.02"
        maxHiz:
          type: string
          description: Günlük maksimum hız (km/s, integer string).
          example: "72"
        yon:
          type: string
          description: >
            **Pusula derecesi (0–360).** `"gidis"/"donus"` değildir.
            0 = Kuzey, 90 = Doğu, 180 = Güney, 270 = Batı.
            Tespit edilen örnek değerler: `"47"`, `"248"`, `"0"`, `"72"`, `"270"`, `"333"`.
          example: "47"
        editDate:
          type: string
          format: date-time
          description: Konumun son güncellenme zamanı (ISO 8601, +03:00 saat dilimi).
          example: "2026-03-05T14:21:15.063+03:00"
        ImageUrl:
          type: string
          description: Harita ikonu URL'si (göreli yol). Renk ile uyumludur.
          example: "images/icon/green_bus.gif"
        HatKodu:
          type: string
          description: Aracın bağlı olduğu hat kodu. `lineCode` ile aynı değer.
          example: "SAMULAŞ EKSPRES D"
        validatorNo:
          type: string
          description: Araçtaki bilet okuyucu (validator) cihaz numarası.
          example: "112"
        tarih:
          type: string
          format: date-time
          description: Konum verisinin zaman damgası (ISO 8601, +03:00 saat dilimi).
          example: "2026-03-05T14:21:10+03:00"

    # ── Sefer Saati Kaydı (Schedules) ─────────────────────────────
    ScheduleItem:
      type: object
      description: >
        Bir hattın ilk durağından kalkış saati kaydı.

        **cizelgekodu Notu:** Alan adı "çizelge kodu" anlamına gelse de gerçekte
        hat kodunu taşır (`hatkodu` ile aynı değerdir). Program/çizelge ID'si değildir.

        **yon Notu:** `"gidis"/"donus"` değil, tek harf `"G"` (gidiş) veya `"D"` (dönüş).
        `"G"` = hattın gidiş yönündeki seferler, `"D"` = dönüş yönündeki seferler.
        Gidiş ve dönüş hatları ayrı `lineCode` değerleriyle sorgulanır (ör. "13 TOKİ-BL.EVLERİ"
        ve "13  BL.EVLERİ-TOKİ"); dolayısıyla tek hattan gelen tüm kayıtlar aynı `yon` değerini taşır.
      required: [cizelgekodu, hatkodu, saat, yon]
      properties:
        cizelgekodu:
          type: string
          description: >
            Hat kodu. İsim "çizelge kodu" olsa da `hatkodu` ile aynı değeri taşır.
            Bağımsız bir program/çizelge kimliği değildir.
          example: "13 TOKİ-BL.EVLERİ"
        hatkodu:
          type: string
          description: Hat kodu (`cizelgekodu` ile aynı değer).
          example: "13 TOKİ-BL.EVLERİ"
        saat:
          type: string
          description: >
            Kalkış saati. Format: `"HH:MM"` (24 saat).
            API sıralı dönmeyebilir; uygulamada sıralama yapılmalıdır.
          pattern: '^\d{2}:\d{2}$'
          example: "15:30"
        yon:
          type: string
          description: >
            Yön. **`"G"` = Gidiş, `"D"` = Dönüş.**
            Şemada `"gidis"/"donus"` yazıyordu; gerçek değer tek harftir.
          enum: ["G", "D"]
          example: "G"

# ═══════════════════════════════════════════════════════════════════
paths:

  # ─────────────────────────────────────────────────────────────────
  /api/Asis/Lines:
    get:
      operationId: getLines
      tags: [Hatlar]
      summary: Aktif Hat Listesi
      description: >
        Sistemde operasyonel olan 74 hattı döndürür.
        Duraklanmış, pasif veya arşivlenmiş hatlar dahil değildir.

        **OrjLines ile Fark:**
        - `Lines` = 74 aktif hat, `tip` (gidis/donus) alanı içerir, `shortLineName` GTFS kısa kodu.
        - `OrjLines` = 134 toplam hat, `tip` yoktur, `shortLineName` tam hat adı, `totalRow` ek alanı.

        **Yanıt:** `{statusCode: 200, message: "", data: [LineItem]}`

        **Dikkat:** Zarftaki `statusCode` bazı durumlarda `500` gelebilir (HTTP 200 olsa da).
      responses:
        '200':
          description: Hat listesi başarıyla döndü.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/LineItem'
              example:
                statusCode: 200
                message: ""
                data:
                  - lineCode: "13 TOKİ-BL.EVLERİ"
                    lineNo: "35"
                    lineName: "13 KAMALI TOKİ - SOĞUKSU"
                    shortLineName: "339"
                    tip: "donus"
                  - lineCode: "13  BL.EVLERİ-TOKİ"
                    lineNo: "36"
                    lineName: "13 SOĞUKSU - KAMALI TOKİ"
                    shortLineName: "338"
                    tip: "gidis"

  # ─────────────────────────────────────────────────────────────────
  /api/Asis/OrjLines:
    get:
      operationId: getOrjLines
      tags: [Hatlar]
      summary: Tüm Hat Listesi (Ham/Orijinal)
      description: >
        Aktif/pasif tüm 134 hattı içeren ham listeyi döndürür.

        **Lines ile farkları:**
        1. `tip` alanı **yoktur** (gidiş/dönüş belirtilmez).
        2. `shortLineName` GTFS kısa kodu değil, **tam hat adını** taşır.
        3. Yanıt zarfında `totalRow` ek alanı bulunur.
        4. 134 kayıt (Lines'ın 74'ünün yaklaşık iki katı).

        **Yanıt:** `{statusCode: 200, message: "", totalRow: 134, data: [LineItem (tip yok)]}`
      responses:
        '200':
          description: Ham hat listesi başarıyla döndü.
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: ""
                  totalRow:
                    type: integer
                    description: Toplam kayıt sayısı. Yalnızca OrjLines yanıtında bulunur.
                    example: 134
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/LineItem'
              example:
                statusCode: 200
                message: ""
                totalRow: 134
                data:
                  - lineCode: "15/A BÜYÜK CAMİ-SOĞUKSU"
                    lineNo: "69"
                    lineName: "15 BÜYÜK CAMİ - SOĞUKSU"
                    shortLineName: "15 BÜYÜK CAMİ - SOĞUKSU"

  # ─────────────────────────────────────────────────────────────────
  /api/Asis/StopsStations:
    get:
      operationId: getStopsStations
      tags: [Duraklar]
      summary: Durak Bilgileri (Statik Konum ve Ad)
      description: >
        Durak/istasyon bilgilerini döndürür. Canlı araç takibi **yapmaz**.
        Canlı araç için `SmartStations` kullanın.

        ## Parametre Kombinasyonları ve Sonuçları

        | lineCode | stopId | Sonuç |
        |----------|--------|-------|
        | ✓ var | — | Hattaki tüm duraklar (orderId ile sıralı) |
        | — | ✓ var (>0) | O durağın geçtiği tüm hatlar (birden fazla kayıt olabilir) |
        | ✓ var | ✓ var | Tek kayıt: o hattaki o durağın konumu ve orderId'si |
        | — | — | Tüm 4522 durak |
        | — | 0 veya negatif | Tüm 4522 durak (0/-1 = parametresiz gibi davranır) |
        | — | 99999 (geçersiz) | Boş liste, statusCode=200 |

        **Önemli:** `stopId=0` veya `stopId=-1` hata döndürmez; tümünü getirir.
        Uygulama katmanında `stopId > 0` doğrulaması yapılmalıdır.

        **stopId == stationId:** Bu endpoint'teki `stopId` değeri, `SmartStations`
        endpoint'indeki `stationId` parametresiyle aynıdır.
      parameters:
        - name: lineCode
          in: query
          required: false
          schema:
            type: string
          description: >
            Hat kodu. `Lines` endpoint'inden alınan `lineCode` değeri kullanılır.
            **Boşluk hassasiyeti:** `"13  BL.EVLERİ-TOKİ"` (çift boşluk içeren) gibi
            kodlar URL encode ile tam eşleşme gerektirir.
          example: "13 TOKİ-BL.EVLERİ"
        - name: stopId
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
          description: >
            Durak kimlik numarası. **1 ve üzeri olmalıdır.**
            0 veya negatif değer, tüm 4522 durağı getirir (beklenmedik davranış).
          example: 6119
      responses:
        '200':
          description: Durak listesi döndü.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/StopItem'
              example:
                statusCode: 200
                message: ""
                data:
                  - stopId: "5392"
                    stopName: "32561 - ŞEHİT YÜZBAŞI TUNÇ FİDANERİ İÖO"
                    orderId: "1"
                    latitude: "41.326801248568"
                    longitude: "36.236367954589"

  # ─────────────────────────────────────────────────────────────────
  /api/Asis/SmartStations:
    get:
      operationId: getSmartStations
      tags: [Duraklar]
      summary: Durağa Yaklaşan Araçlar (Canlı)
      description: >
        Belirtilen durağa yaklaşan araçların **gerçek zamanlı** verilerini döndürür.
        Fiziksel akıllı durak ekranlarıyla aynı veri kaynağını kullanır.

        **Parametresiz çağrı:** HTTP 200 döner ama `data: []` gelir.

        **stationId == stopId:** `StopsStations`'daki `stopId` ile aynı değerdir.
        Durak adı/koordinatı için önce `StopsStations?stopId=X` çağrısı yapın,
        sonra `SmartStations?stationId=X` ile canlı araç bilgisi alın.

        **Boş sonuç ne anlama gelir?** Durağa yaklaşan araç yoktur veya
        durak henüz akıllı sisteme bağlı değildir.

        **Yanıt formatı her zaman aynıdır:**
        `{statusCode: 200, message: "", data: [...]}` — kayıt olsun ya da olmasın.
      parameters:
        - name: stationId
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
          description: >
            Durak/panel kimlik numarası. `StopsStations.stopId` ile aynı değer.
            Parametresiz çağrı boş sonuç döndürür (hata değil).
          example: 6119
      responses:
        '200':
          description: Akıllı durak verisi döndü. Durağa araç yoksa `data: []`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SmartStationItem'
              example:
                statusCode: 200
                message: ""
                data:
                  - BusLineCode: "13 SOĞUKSU - KAMALI TOKİ (275)"
                    BusLineNo: "36"
                    BusLineShortName: "338"
                    panelId: "6119"
                    RemainingTimeCurr: "0"
                    RemainingTimeNext: "60"
                    IsAccordingToTimeSchedule: "A"
                    BusStatusCurr: "0"
                    BusStatusNext: "0"
                    distance: "0"
                    RemainingNumberOfBusStops: "0"
                    latitude: "41.26631333"
                    longitude: "36.35035833"
                    speed: "17"
                    direction: "71"

  # ─────────────────────────────────────────────────────────────────
  /api/Asis/LineDirections:
    get:
      operationId: getLineDirections
      tags: [Hat Güzergahı]
      summary: Tüm Hatların Yön ve Güzergah Verisi
      description: >
        **⚠ KRİTİK UYARI — SUNUCU TARAFI FİLTRE ÇALIŞMIYOR:**

        `lineCode` parametresi gönderilmesi **zorunludur** (boş string veya parametresiz = HTTP 400).
        Ancak parametre değerinin **hiçbir önemi yoktur** — gerçek hat kodu, yanlış kod,
        sahte kod fark etmez; her durumda **tüm sisteme ait 8557 kayıt** döner.

        **Bu endpoint'i doğru kullanmak için:**
        1. Herhangi bir geçerli `lineCode` ile çağırın (tüm veriyi çekmek için).
        2. Dönen 8557 kayıt içinde `lineCode` alanına göre **istemci tarafında filtreleyin**.

        **Direction Değerleri:**
        - `"FORWARD"`: Gidiş yönü
        - `"BACKWARD"`: Dönüş yönü
        - `"CIRCULAR"`: Dairesel/ring hat (başlangıç = bitiş)
      parameters:
        - name: lineCode
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: >
            **Zorunludur** (yoksa veya boş string = HTTP 400).
            Ancak değeri filtrelemeyi **etkilemez**; daima tüm 8557 kayıt döner.
            Herhangi geçerli bir hat kodu kullanılabilir.
          example: "13 TOKİ-BL.EVLERİ"
      responses:
        '200':
          description: >
            Tüm sisteme ait yön/güzergah verisi. Her zaman ~8557 kayıt döner.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/LineDirectionItem'
              example:
                statusCode: 200
                message: ""
                data:
                  - Direction: "CIRCULAR"
                    lineCode: "KAMALI TOP.KONT."
                    lineNo: "119"
                    stopName: "İLK DURAK"
                    orderId: "0"
                    durakId: "800"
                  - Direction: "FORWARD"
                    lineCode: "13 TOKİ-BL.EVLERİ"
                    lineNo: "35"
                    stopName: "32561 - ŞEHİT YÜZBAŞI TUNÇ FİDANERİ İÖO"
                    orderId: "1"
                    durakId: "5392"
        '400':
          description: >
            `lineCode` parametresi eksik veya boş string.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # ─────────────────────────────────────────────────────────────────
  /api/Asis/RealTimeData:
    get:
      operationId: getRealTimeData
      tags: [Canlı Araç Takibi]
      summary: Hattaki Araçların Anlık Konumları
      description: >
        Belirtilen hatta şu an aktif sefer yapan araçların GPS verilerini döndürür.

        **`lineCode` zorunludur.** Parametresiz veya boş string = HTTP 400.

        **`yon` alanı pusula derecesidir (0–360).** `"gidis"/"donus"` değildir.
        Harita üzerinde araç yönü için bu değeri kullanın.
        Aracın gidişat yönünü belirlemek için hat kodu sonekine bakın
        (GİDİŞ/DÖNÜŞ veya gidiş/dönüş hat kodu çifti kullanın).

        **`renk` alanı araç durumunu gösterir:**
        - `"00FF00"` (yeşil) = normal
        - `"FF0000"` (kırmızı) = dikkat
        - `"FFFF00"` (sarı) = uyarı

        **Araçsız hat:** HTTP 200, `data: []` döner.
      parameters:
        - name: lineCode
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: >
            Araçları takip edilecek hattın kodu. `Lines` endpoint'inden alınır.
            **Zorunludur** — eksik veya boş = HTTP 400.
          example: "SAMULAŞ EKSPRES D"
      responses:
        '200':
          description: >
            Anlık araç konumları. Hatta araç yoksa `data: []`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RealTimeItem'
              example:
                statusCode: 200
                message: ""
                data:
                  - plaka: "55 APK 902"
                    enlem: "41.36777833"
                    boylam: "36.18768167"
                    renk: "00FF00"
                    hiz: "67.00"
                    mesafe: "129120"
                    surucu: "AD SOYAD ((5XX)XXX XX XX)"
                    gunlukYolcu: "492"
                    seferYolcu: "151"
                    durakYolcu: "0"
                    toplamHasilat: "3210.02"
                    maxHiz: "72"
                    yon: "47"
                    editDate: "2026-03-05T14:21:15.063+03:00"
                    ImageUrl: "images/icon/green_bus.gif"
                    HatKodu: "SAMULAŞ EKSPRES D"
                    validatorNo: "112"
                    tarih: "2026-03-05T14:21:10+03:00"
        '400':
          description: >
            `lineCode` parametresi eksik veya boş string.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  # ─────────────────────────────────────────────────────────────────
  /api/Asis/Schedules:
    get:
      operationId: getSchedules
      tags: [Sefer Saatleri]
      summary: Hat Sefer Saatleri (Aktif Çizelge)
      description: >
        Bir hattın ilk durağından kalkış saatlerini döndürür.

        ## Zorunlu Parametre Kombinasyonu

        `lineCode` **ve** `scheduleDate` **birlikte gönderilmek zorundadır.**
        Biri eksikse HTTP 200 alınır ama zarftaki `statusCode=500` olur ve `data: []` gelir.

        ## scheduleDate Hakkında Kritik Not

        `scheduleDate` parametresi **zorunludur** ama **etkisizdir**.
        Dün, bugün veya yarının tarihi gönderilmesi sonucu **değiştirmez**.
        API daima **aktif çizelge programını** döndürür.

        `date` formatı (`"2026-03-05"`) yeterlidir.
        `date-time` formatı (`"2026-03-05T00:00:00"`) da kabul edilir.

        ## Yanıt Alanları Hakkında

        - `cizelgekodu`: Alan adı yanıltıcıdır — hat kodunu taşır, çizelge ID'si değildir.
        - `yon`: `"G"` (gidiş) veya `"D"` (dönüş). `"gidis"/"donus"` değildir.
        - Sefer saatleri sırasız gelebilir; uygulamada saat sıralaması yapılmalıdır.
      parameters:
        - name: lineCode
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: >
            Hat kodu. **Zorunludur** — eksikse statusCode=500, data=[].
          example: "13 TOKİ-BL.EVLERİ"
        - name: scheduleDate
          in: query
          required: true
          schema:
            type: string
          description: >
            Tarih parametresi. **Zorunludur** — eksikse statusCode=500, data=[].
            Ancak **değeri sonucu etkilemez**; her tarih için aynı aktif çizelge döner.

            Kabul edilen formatlar:
            - `"2026-03-05"` (date — önerilir)
            - `"2026-03-05T00:00:00"` (date-time — da çalışır)
          example: "2026-03-05"
      responses:
        '200':
          description: >
            Sefer saatleri listesi.
            Her iki parametre varsa ve hat geçerliyse sefer saatleri gelir.
            Parametre eksikse HTTP 200 ama `statusCode=500`, `data=[]`.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/ScheduleItem'
              examples:
                basarili:
                  summary: Başarılı yanıt (her iki parametre mevcut)
                  value:
                    statusCode: 200
                    message: ""
                    data:
                      - cizelgekodu: "13 TOKİ-BL.EVLERİ"
                        hatkodu: "13 TOKİ-BL.EVLERİ"
                        saat: "06:30"
                        yon: "G"
                      - cizelgekodu: "13 TOKİ-BL.EVLERİ"
                        hatkodu: "13 TOKİ-BL.EVLERİ"
                        saat: "07:00"
                        yon: "G"
                eksik_parametre:
                  summary: Eksik parametre (statusCode=500)
                  value:
                    statusCode: 500
                    message: ""
                    data: []

# ═══════════════════════════════════════════════════════════════════
tags:
  - name: Hatlar
    description: >
      Hat listeleri. `Lines` = 74 aktif hat (tip alanı var, shortLineName GTFS kodu).
      `OrjLines` = 134 toplam hat (tip yok, shortLineName tam ad, totalRow ek alanı).
  - name: Duraklar
    description: >
      `StopsStations` = statik durak bilgisi (konum, ad, sıra — canlı araç yok).
      `SmartStations` = durağa yaklaşan canlı araçlar. Her ikisi de aynı durak ID'sini kullanır.
  - name: Hat Güzergahı
    description: >
      `LineDirections` = tüm hatların yön ve güzergah verisi.
      ⚠ lineCode filtresi sunucu tarafında çalışmaz; istemci tarafında filtreleme zorunludur.
  - name: Canlı Araç Takibi
    description: >
      `RealTimeData` = hattaki araçların anlık GPS konumu. `yon` alanı 0–360 pusula derecesidir.
  - name: Sefer Saatleri
    description: >
      `Schedules` = aktif çizelge saatleri. Her iki parametre zorunlu, ama scheduleDate etkisiz.
      `yon` değeri "G" veya "D" (tek harf).

# ─── Flutter/Dart Uygulama Notları ─────────────────────────────────
# x-flutter-notes:
#   - Tüm endpoint'ler _extractDataList() ile işlenmeli (ham liste dönmez)
#   - getHattakiAraclar ve getDuragaYaklasanAraclar'da "data is List" kontrolü kaldırılmalı
#   - Schedules'ta "yon == G" kontrolü yapılmalı ("gidis" değil)
#   - RealTimeData'da "yon" pusula derecesi — "gidis/donus" dönüşümü yapılmamalı
#   - LineDirections'tan dönen 8557 kayıt arasında lineCode'a göre istemci filtrelemesi şart
#   - scheduleDate parametresi gereksiz kompleksilik içeriyor; herhangi tarih geçerlidir
