name: samsun_ulasim
description: "Samsun Mobil Uygulaması"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+24

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_map: ^6.2.1
  latlong2: ^0.9.0
  geolocator: ^13.0.0
  http: ^1.2.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  sqflite: ^2.3.3
  path: ^1.9.0
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  vector_math: ^2.1.4
  proj4dart: ^2.1.0
  cupertino_icons: ^1.0.2
  package_info_plus: ^9.0.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  sqflite_common_ffi: ^2.3.3

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: assets/splash_logo.png

  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
    image: assets/splash_logo.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/android_icons/playstore_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
