name: samsun_mobil_app
description: "Samsun Mobil Uygulaması"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+3

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  http: ^1.2.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.4
  sqflite: ^2.3.2
  path: ^1.8.3
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  vector_math: ^2.1.4
  proj4dart: ^2.1.0
  flutter_launcher_icons: ^0.13.1
  cupertino_icons: ^1.0.2
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_native_splash: ^2.4.0

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#121212"
  image: assets/splash_logo.png

  android_12:
    color: "#FFFFFF"
    color_dark: "#121212"
    image: assets/splash_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
